<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris - Night City Ultra</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffff; font-family: monospace; pointer-events: none; text-shadow: 0 0 10px #00ffff; }
    </style>
</head>
<body>
    <div id="ui">AETHERIS: CITY GEN V2 | WASD - MOVE | CLICK TO START</div>

    <script type="importmap">
        { "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- ОСВЕЩЕНИЕ (Чтобы город не был черным) ---
        const hemiLight = new THREE.HemisphereLight(0x4444ff, 0x000000, 1.5);
        scene.add(hemiLight);

        // --- ГЕНЕРАЦИЯ ГОРОДА ---
        const citySize = 30; // 30x30 кварталов для скорости
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        
        // Материал с САМОСВЕЧЕНИЕМ (Emissive) — здания будут светиться сами!
        const cityMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.1, 
            metalness: 0.8,
            emissive: 0x112244, // Синее свечение окон
            emissiveIntensity: 0.5
        });

        const cityMesh = new THREE.InstancedMesh(boxGeo, cityMat, citySize * citySize);
        const dummy = new THREE.Object3D();
        let idx = 0;

        for (let x = -citySize/2; x < citySize/2; x++) {
            for (let z = -citySize/2; z < citySize/2; z++) {
                const h = 5 + Math.random() * 50;
                dummy.position.set(x * 20, h/2, z * 20);
                dummy.scale.set(10, h, 10);
                dummy.updateMatrix();
                cityMesh.setMatrixAt(idx++, dummy.matrix);
                
                // Добавим фонарь на каждый 5-й небоскреб для "пучков света"
                if (Math.random() > 0.8) {
                    const light = new THREE.PointLight(0x00ffff, 100, 40);
                    light.position.set(x * 20, 2, z * 20);
                    scene.add(light);
                }
            }
        }
        scene.add(cityMesh);

        // Пол (Дорога)
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000),
            new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- УПРАВЛЕНИЕ ---
        camera.position.set(0, 2, 50);
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        document.body.onclick = () => document.body.requestPointerLock();
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });
        camera.rotation.order = 'YXZ';

        function animate() {
            requestAnimationFrame(animate);
            const s = 0.4;
            if (keys['KeyW']) camera.translateZ(-s);
            if (keys['KeyS']) camera.translateZ(s);
            if (keys['KeyA']) camera.translateX(-s);
            if (keys['KeyD']) camera.translateX(s);
            camera.position.y = 2;

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
